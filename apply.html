<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지원서 작성</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#05060f,#0a0f2b);
display:flex;
justify-content:center;
align-items:center;
font-family:Pretendard;
color:white;
}

.container{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
width:350px;
backdrop-filter:blur(10px);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:20px;
background:#00ff9d;
font-size:16px;
cursor:pointer;
}

.back{
background:#555;
}

.monkey{
text-align:center;
font-size:50px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="monkey">🐵</div>

<h2>동아리 지원서</h2>

<input placeholder="이름">

<input placeholder="학번">

<input placeholder="전화번호">

<textarea placeholder="지원 동기"></textarea>

<button>지원서 제출</button>

<button class="back" onclick="location.href='index.html'">
돌아가기
</button>

</div>

</body>
</html>
