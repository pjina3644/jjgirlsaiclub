<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>인공지능탐구부 지원</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Pretendard',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
font-size:28px;
margin-bottom:25px;
}

.monkey{
font-size:70px;
text-align:center;
margin-bottom:10px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

label{
font-size:15px;
opacity:0.9;
}

input,textarea{
width:100%;
padding:14px;
font-size:16px;
border-radius:10px;
border:none;
outline:none;
background:#1e293b;
color:white;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
margin-top:10px;
padding:16px;
font-size:18px;
font-weight:600;
border:none;
border-radius:12px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.back{
margin-top:15px;
background:#334155;
}

.back:hover{
background:#475569;
}

.success{
display:none;
text-align:center;
font-size:18px;
margin-top:20px;
color:#22c55e;
}

</style>
</head>

<body>

<div class="container">

<div class="monkey">🐵</div>

<h1>인공지능탐구부 지원서</h1>

<form id="applyForm">

<label>이름</label>
<input type="text" required>

<label>학년 / 반</label>
<input type="text" placeholder="예: 1학년 3반" required>

<label>전화번호</label>
<input type="tel" placeholder="010-0000-0000" required>

<label>지원 동기</label>
<textarea required></textarea>

<label>하고 싶은 프로젝트</label>
<textarea></textarea>

<button type="submit">지원하기 🚀</button>

</form>

<div class="success" id="success">
지원이 접수되었습니다!
</div>

<button class="back" onclick="location.href='index.html'">
← 메인으로 돌아가기
</button>

</div>

<script>

document.getElementById("applyForm").addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("success").style.display="block";

this.reset();

});

</script>

</body>
</html>
