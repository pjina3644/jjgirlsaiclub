<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지원서 작성</title>

<style>
body{
font-family:Arial;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:400px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#4a6cf7;
border:none;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#3451d1;
}
</style>
</head>

<body>

<div class="container">

<h2>동아리 지원</h2>

<label>이름</label>
<input id="name">

<label>학번</label>
<input id="studentId">

<label>지원동기</label>
<textarea id="reason"></textarea>

<button onclick="submitApplication()">지원하기</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBMquwGMX__QpGyK62NDC64EdrKnLu3Dxk",
authDomain: "club-ca1bf.firebaseapp.com",
projectId: "club-ca1bf",
storageBucket: "club-ca1bf.firebasestorage.app",
messagingSenderId: "396844667638",
appId: "1:396844667638:web:794d61d7b21009281ed2d7",
measurementId: "G-RXEHB4X3TW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitApplication = async function(){

const name=document.getElementById("name").value
const studentId=document.getElementById("studentId").value
const reason=document.getElementById("reason").value

if(name=="" || studentId=="" || reason==""){
alert("모든 항목을 입력해주세요")
return
}

await addDoc(collection(db,"applications"),{
name:name,
studentId:studentId,
reason:reason,
time:new Date()
})

alert("지원 완료!")a

document.getElementById("name").value=""
document.getElementById("studentId").value=""
document.getElementById("reason").value=""

}

</script>
