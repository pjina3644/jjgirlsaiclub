<form id="applyForm">
  <input id="name" placeholder="이름" required>
  <input id="student" placeholder="학번" required>
  <input id="phone" placeholder="전화번호" required>
  <input id="reason" placeholder="지원 이유" required>
  <input id="project" placeholder="프로젝트" required>
  <button type="submit">제출</button>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMquwGMX__QpGyK62NDC64EdrKnLu3Dxk",
  authDomain: "club-ca1bf.firebaseapp.com",
  projectId: "club-ca1bf",
  storageBucket: "club-ca1bf.firebasestorage.app",
  messagingSenderId: "396844667638",
  appId: "1:396844667638:web:794d61d7b21009281ed2d7",
  measurementId: "G-RXEHB4X3TW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("applyForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const student = document.getElementById("student").value;
  const phone = document.getElementById("phone").value;
  const reason = document.getElementById("reason").value;
  const project = document.getElementById("project").value;

  console.log({name, student, phone, reason, project}); // 값 확인용

  try {
    await addDoc(collection(db, "applications"), {
      name,
      student,
      phone,
      reason,
      project,
      time: new Date()
    });
    alert("지원이 정상적으로 접수되었습니다!");
    form.reset();
  } catch (error) {
    console.error(error);
    alert("저장 실패: " + error.message);
  }
});
</script>
