<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>동아리 지원</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Pretendard', sans-serif;
background:#f5f7fb;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:50px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-align:center;
width:380px;
}

h1{
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:30px;
}

button{
background:#4a6cf7;
border:none;
color:white;
font-size:16px;
padding:14px 28px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#3451d1;
}

</style>
</head>

<body>

<div class="container">

<h1>동아리 지원</h1>
<p>지원서를 작성하려면 아래 버튼을 눌러주세요</p>

<button onclick="goApply()">지원하기</button>

</div>

<script>

function goApply(){
location.href="apply.html"
}

</script>

</body>
</html>
