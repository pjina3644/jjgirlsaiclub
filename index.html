<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숭돌이 AI</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0b0f1a;
color:#e2e8f0;
font-family:'Pretendard',sans-serif;
margin:0;
padding:30px;
text-align:center;
overflow-x:hidden;
}

#terminal{
max-width:600px;
margin:auto;
text-align:left;
white-space:pre-line;
font-family:monospace;
color:#00ff9c;
border-left:3px solid #00ff9c;
padding-left:12px;
}

.sparkle{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:spark 3s infinite;
}

@keyframes spark{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

#monkey{
font-size:90px;
display:none;
margin-top:20px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

#chat{
display:none;
max-width:600px;
margin:30px auto;
}

#bubble{
background:#111827;
padding:18px;
border-radius:14px;
min-height:60px;
margin-bottom:15px;
text-align:left;
}

button{
background:#000;
color:#00ff9c;
border:1px solid #00ff9c;
padding:14px;
margin:6px 0;
border-radius:12px;
width:100%;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 15px #00ff9c;
}

.applyBtn{
background:#00ff9c;
color:black;
font-weight:600;
}

</style>
</head>

<body>

<div id="terminal"></div>

<div id="monkey">🤖🐵</div>

<div id="chat">

<div id="bubble"></div>

<button onclick="ask('intro')">동아리 소개</button>
<button onclick="ask('plan')">동아리 활동</button>
<button onclick="ask('target')">모집 대상</button>
<button onclick="ask('apply')">모집 일정</button>
<button onclick="ask('etc')">문의</button>

<button class="applyBtn" onclick="goApply()">🚀 지원하기</button>

</div>

<script>

const terminal=document.getElementById("terminal")

const bootLogs=[
"booting system...",
"loading robotics module...",
"connecting AI core...",
"initializing sensors...",
"starting Sundol AI...",
"ERROR: monkey_ai_not_found",
"system restart...",
"monkey AI detected 🐵"
]

let logIndex=0

function boot(){

if(logIndex<bootLogs.length){

terminal.innerHTML+=bootLogs[logIndex]+"\n"
logIndex++

setTimeout(boot,350)

}else{

setTimeout(showMonkey,800)

}

}

boot()

function showMonkey(){

document.getElementById("monkey").style.display="block"
document.getElementById("chat").style.display="block"

typeText("안녕! 나는 로봇 원숭이 AI '숭돌이'야 🐵🤖 궁금한걸 눌러봐!")

}

const answers={

intro:"우리는 AI · 로봇 · 코딩을 배우는 공학 동아리야.",

plan:"아두이노, 자율주행 자동차 키트, IoT 프로젝트, AI 모델 실습 등을 진행할 예정이야.",

target:"컴퓨터공학, AI, 로봇공학 등 공학 분야에 관심 있는 학생을 모집해!",

apply:"면접은 13일 예정이야!",

etc:"문의: 20509 박진아"

}

function typeText(text){

const bubble=document.getElementById("bubble")
bubble.innerHTML=""

let i=0

const interval=setInterval(()=>{

bubble.innerHTML+=text[i]
i++

if(i>=text.length)clearInterval(interval)

},25)

}

function ask(key){

const buttons=document.querySelectorAll("button")
buttons.forEach(b=>b.disabled=true)

typeText("숭돌이 생각중...")

setTimeout(()=>{

typeText(answers[key])
buttons.forEach(b=>b.disabled=false)

},900)

}

function goApply(){

confetti()

setTimeout(()=>{
location.href="apply.html"
},700)

}

function confetti(){

for(let i=0;i<30;i++){

let s=document.createElement("div")
s.className="sparkle"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

document.body.appendChild(s)

setTimeout(()=>s.remove(),3000)

}

}

</script>

</body>
</html>
