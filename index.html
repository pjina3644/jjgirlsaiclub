<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>인공지능탐구부</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#05060f;
color:white;
font-family:Pretendard;
overflow:hidden;
}

/* 배경 코드 */

#code{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
color:#00ff9d;
font-family:"Fira Code";
font-size:14px;
opacity:0.25;
white-space:pre-wrap;
padding:25px;
}

/* 메인 */

#main{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
display:none;
width:90%;
}

/* 원숭이 */

.monkey{
font-size:80px;
margin-bottom:10px;
animation:bounce 2s infinite;
}

/* 제목 */

h1{
font-size:34px;
margin-bottom:5px;
}

p{
opacity:0.8;
margin-bottom:20px;
}

/* 챗봇 */

#bubble{
background:rgba(0,0,0,0.7);
padding:18px;
border-radius:16px;
min-height:60px;
margin-bottom:15px;
font-size:16px;
}

/* 버튼 */

button{
width:100%;
padding:16px;
margin:6px 0;
font-size:16px;
border:none;
border-radius:14px;
background:#00ff9d;
font-weight:600;
}

button:active{
transform:scale(0.96);
}

/* 애니메이션 */

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

.spark{
position:absolute;
font-size:20px;
animation:spark 3s infinite;
}

@keyframes spark{
0%{opacity:0;transform:scale(0)}
50%{opacity:1}
100%{opacity:0}
}

</style>
</head>

<body>

<div id="code"></div>

<div id="main">

<div class="monkey">🐵</div>

<h1>인공지능탐구부</h1>
<p>AI · 코딩 · 피지컬컴퓨팅 동아리</p>

<div id="bubble">
안녕! 나는 동아리 안내 AI 숭돌이야 🐵
궁금한 걸 눌러봐!
</div>

<button onclick="ask('intro')">동아리 소개</button>
<button onclick="ask('plan')">활동 계획</button>
<button onclick="ask('target')">모집 대상</button>
<button onclick="ask('apply')">모집 일정</button>
<button onclick="location.href='apply.html'">지원하기 🚀</button>

</div>

<script>

/* 코드 타이핑 */

const codeText = `
booting ai system...
loading python modules...
import robotics
import machine_learning

initializing raspberry pi...
starting neural network...
connecting sensors...

AI club system ready

>>> COMPLETE
`;

let i=0

function typing(){

document.getElementById("code").innerText+=codeText[i]
i++

if(i<codeText.length){

setTimeout(typing,25)

}else{

setTimeout(()=>{
document.getElementById("main").style.display="block"
},500)

}

}

typing()

/* 챗봇 답변 */

const answers={

intro:"인공지능탐구부는 AI, 코딩, 피지컬컴퓨팅을 탐구하는 동아리야!",

plan:"아두이노, 자율주행 키트, AI 프로젝트 등 다양한 활동을 할 예정이야!",

target:"공학, 컴퓨터, 게임개발 등에 관심 있는 학생들을 모집해!",

apply:"면접은 3월 13일 예정이야!"
}

function ask(key){

const bubble=document.getElementById("bubble")

bubble.innerText="숭돌이 생각중..."

setTimeout(()=>{
bubble.innerText=answers[key]
},800)

}

/* 반짝이 */

for(let i=0;i<20;i++){

let s=document.createElement("div")
s.className="spark"
s.innerText="✨"

s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"

document.body.appendChild(s)

}

</script>

</body>
</html>
