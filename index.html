<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인공지능탐구부</title>

<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:#05060f;
color:white;
font-family:Pretendard;
}

#code{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
font-family:"Fira Code";
font-size:14px;
color:#00ff9d;
white-space:pre-wrap;
opacity:0.3;
padding:40px;
}

#main{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
opacity:0;
transition:1s;
}

h1{
font-size:48px;
margin-bottom:10px;
}

.monkey{
font-size:90px;
animation:bounce 2s infinite;
}

button{
margin-top:20px;
padding:15px 40px;
border:none;
border-radius:30px;
background:#00ff9d;
font-size:18px;
cursor:pointer;
font-weight:600;
}

button:hover{
transform:scale(1.05);
}

.sparkle{
position:absolute;
font-size:20px;
animation:spark 3s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

@keyframes spark{
0%{opacity:0;transform:scale(0)}
50%{opacity:1;transform:scale(1)}
100%{opacity:0}
}

</style>
</head>

<body>

<div id="code"></div>

<div id="main">
<div class="monkey">🐵</div>
<h1>인공지능탐구부</h1>
<p>AI와 코딩을 탐구하는 동아리</p>

<button onclick="location.href='apply.html'">
지원하기
</button>

</div>

<script>

const codeText = `
import AI from "future";

function createAI(){
   let intelligence = true;
   let curiosity = true;

   if(intelligence && curiosity){
      return "AI Club Activated";
   }
}

class Student{
   constructor(name){
      this.name = name;
      this.skill = "learning";
   }
}

let club = [];

for(let i=0;i<10;i++){
   club.push(new Student("member"));
}

console.log(createAI());
`;

let i=0;

function typing(){
document.getElementById("code").innerText += codeText[i];
i++;

if(i < codeText.length){
setTimeout(typing,20);
}else{
setTimeout(()=>{
document.getElementById("main").style.opacity=1;
},500);
}
}

typing();

for(let i=0;i<20;i++){

let s=document.createElement("div");
s.className="sparkle";
s.innerText="✨";

s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";

document.body.appendChild(s);
}

</script>

</body>
</html>
