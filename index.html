<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숭돌이 AI</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0f172a;
color:#e2e8f0;
font-family:'Pretendard',sans-serif;
margin:0;
padding:30px;
text-align:center;
}

#terminal{
max-width:600px;
margin:auto;
text-align:left;
white-space:pre-line;
font-family:monospace;
color:#22c55e;
}

#robot{
font-size:90px;
display:none;
margin-top:20px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

#chat{
display:none;
max-width:600px;
margin:30px auto;
}

#bubble{
background:#1e293b;
padding:18px;
border-radius:14px;
min-height:60px;
margin-bottom:15px;
text-align:left;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px;
margin:6px 0;
border-radius:10px;
width:100%;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.02);
}

.applyBtn{
background:#22c55e;
}

.applyBtn:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div id="terminal"></div>

<div id="robot">🤖</div>

<div id="chat">

<div id="bubble"></div>

<button onclick="ask('intro')">동아리 소개</button>
<button onclick="ask('plan')">동아리 활동</button>
<button onclick="ask('target')">모집 대상</button>
<button onclick="ask('apply')">모집 일정</button>
<button onclick="ask('etc')">문의</button>

<button class="applyBtn" onclick="goApply()">🚀 지원하기</button>

</div>

<script>

const terminal=document.getElementById("terminal")

const bootLogs=[
"booting system...",
"loading AI module...",
"connecting robotics kit...",
"initializing sensors...",
"starting Sundol AI...",
"ERROR: monkey_ai_not_found",
"system restart...",
"loading backup AI..."
]

let logIndex=0

function boot(){

if(logIndex<bootLogs.length){

terminal.innerHTML+=bootLogs[logIndex]+"\n"
logIndex++

setTimeout(boot,350)

}else{

setTimeout(showRobot,800)

}

}

boot()

function showRobot(){

document.getElementById("robot").style.display="block"
document.getElementById("chat").style.display="block"

typeText("안녕! 나는 동아리 안내 AI '숭돌이'야 🤖 무엇이 궁금해?")

}

const answers={

intro:"우리는 AI · 로봇 · 코딩을 배우는 공학 동아리야.",

plan:"아두이노, 자율주행 키트, IoT 프로젝트, AI 모델 실습 등을 진행할 예정이야.",

target:"컴퓨터공학, AI, 로봇공학 등 공학 분야에 관심 있는 학생을 모집해!",

apply:"면접은 13일 예정이야!",

etc:"문의: 20509 박진아"

}

function typeText(text){

const bubble=document.getElementById("bubble")
bubble.innerHTML=""

let i=0

const interval=setInterval(()=>{

bubble.innerHTML+=text[i]
i++

if(i>=text.length)clearInterval(interval)

},25)

}

function ask(key){

const buttons=document.querySelectorAll("button")
buttons.forEach(b=>b.disabled=true)

typeText("숭돌이 생각중...")

setTimeout(()=>{

typeText(answers[key])
buttons.forEach(b=>b.disabled=false)

},900)

}

function goApply(){

location.href="apply.html"

}

</script>

</body>
</html>
