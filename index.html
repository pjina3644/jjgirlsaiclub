<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>숭돌이 AI</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0a0f14;
color:#e6faff;
font-family:'Pretendard',sans-serif;
margin:0;
padding:20px;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:30px;
margin-top:10px;
}

#terminal{
max-width:520px;
margin:auto;
text-align:left;
font-family:monospace;
background:#05080c;
padding:15px;
border-radius:12px;
box-shadow:0 0 15px #00ffc3;
white-space:pre-line;
color:#00ffc3;
}

/* 로봇원숭이 */

#monkey{

font-size:90px;
margin-top:20px;
animation:float 3s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}

}

/* 반짝이 효과 */

.sparkle{
position:fixed;
width:6px;
height:6px;
background:#00ffc3;
border-radius:50%;
animation:spark 4s linear infinite;
}

@keyframes spark{
0%{opacity:0; transform:translateY(0)}
50%{opacity:1}
100%{opacity:0; transform:translateY(-200px)}
}

/* 챗봇 */

#chat{
display:none;
margin-top:25px;
}

#bubble{

background:#111c24;
padding:18px;
border-radius:14px;
margin-bottom:15px;
min-height:70px;

}

/* 버튼 */

button{

background:#0f1720;
color:#00ffc3;
border:1px solid #00ffc3;
padding:14px;
margin:6px;
border-radius:12px;
width:100%;
font-size:15px;
cursor:pointer;
transition:0.2s;

}

button:hover{

transform:scale(1.05);
box-shadow:0 0 12px #00ffc3;

}

/* 코드 줄기 효과 */

.codeRain{
position:fixed;
top:0;
font-family:monospace;
font-size:14px;
color:#00ffc3;
opacity:0.2;
animation:rain linear infinite;
}

@keyframes rain{
0%{transform:translateY(-100vh)}
100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<h1>🤖🐵 숭돌이 AI 동아리</h1>

<div id="terminal"></div>

<div id="monkey">
🤖🐵
</div>

<div id="chat">

<div id="bubble"></div>

<button onclick="ask('intro')">동아리 소개</button>
<button onclick="ask('plan')">활동 계획</button>
<button onclick="ask('target')">모집 대상</button>
<button onclick="ask('apply')">모집 안내</button>
<button onclick="ask('etc')">문의</button>
<button onclick="goApply()">🚀 지원하기</button>

</div>

<script>

/* 터미널 부팅 */

const terminal=document.getElementById("terminal")

const bootLogs=[

"booting system...",
"loading AI module...",
"connecting robotics kit...",
"starting Sundol AI...",
"ERROR: monkey_ai_missing",
"searching banana database...",
"AI monkey found 🐵",
"system online"

]

let logIndex=0

function boot(){

if(logIndex<bootLogs.length){

terminal.innerHTML+=bootLogs[logIndex]+"\n"
logIndex++

setTimeout(boot,350)

}else{

setTimeout(showChat,800)

}

}

boot()

function showChat(){

document.getElementById("chat").style.display="block"

typeText("안녕! 나는 로봇 원숭이 숭돌이야 🤖🐵 궁금한 걸 눌러봐!")

}

/* 챗봇 답변 */

const answers={

intro:"우리는 AI, 로봇, 코딩을 배우는 동아리야!",

plan:"아두이노, 자율주행 키트, 피지컬컴퓨팅 프로젝트, AI 활용 프로젝트 등을 진행할 예정이야!",

target:"AI, 컴퓨터공학, 로봇공학, 게임개발 등에 관심 있는 학생!",

apply:"면접 예정일은 13일이야!",

etc:"문의: 20509 박진아"

}

/* 타이핑 효과 */

function typeText(text){

const bubble=document.getElementById("bubble")

bubble.innerHTML=""

let i=0

const interval=setInterval(()=>{

bubble.innerHTML+=text[i]
i++

if(i>=text.length)clearInterval(interval)

},30)

}

function ask(key){

typeText("숭돌이 생각중...")

setTimeout(()=>{

typeText(answers[key])

},900)

}

/* 지원서 이동 */

function goApply(){

location.href="apply.html"

}

/* 반짝이 생성 */

for(let i=0;i<20;i++){

const s=document.createElement("div")

s.className="sparkle"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDuration=3+Math.random()*3+"s"

document.body.appendChild(s)

}

/* 코드비 효과 */

const chars="01{}<>/"

for(let i=0;i<20;i++){

const r=document.createElement("div")

r.className="codeRain"

r.innerText=chars[Math.floor(Math.random()*chars.length)]

r.style.left=Math.random()*100+"vw"

r.style.animationDuration=5+Math.random()*5+"s"

document.body.appendChild(r)

}

</script>

</body>
</html>
