<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>인공지능탐구부</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#00ff9c;
font-family:'JetBrains Mono',monospace;
overflow-x:hidden;
}

/* 배경 코드 */

#codeBackground{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
white-space:pre;
opacity:0.18;
font-size:12px;
line-height:16px;
pointer-events:none;
}

.container{
position:relative;
z-index:2;
padding:25px;
text-align:center;
}

#terminal{
font-size:14px;
text-align:left;
max-width:600px;
margin:auto;
margin-top:20px;
white-space:pre-line;
}

#monkey{
font-size:90px;
margin-top:20px;
display:none;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

#chat{
display:none;
margin-top:25px;
}

#bubble{
background:#001a12;
padding:18px;
border-radius:15px;
min-height:70px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:18px;
margin:6px 0;
border:none;
border-radius:14px;
background:#00291d;
color:#00ff9c;
font-size:17px;
font-weight:600;
}

button:active{
transform:scale(0.97);
}

.apply{
background:#00ff9c;
color:#000;
font-weight:700;
}

</style>
</head>

<body>

<pre id="codeBackground"></pre>

<div class="container">

<div id="terminal"></div>

<div id="monkey">🐵</div>

<div id="chat">

<div id="bubble"></div>

<button onclick="ask('intro')">동아리 소개</button>
<button onclick="ask('plan')">활동 계획</button>
<button onclick="ask('target')">모집 대상</button>
<button onclick="ask('apply')">모집 안내</button>
<button onclick="ask('etc')">기타 문의</button>

<button class="apply" onclick="location.href='apply.html'">
🚀 지원하기 🚀
</button>

</div>

</div>

<script>

/* 배경 코드 생성 */

const codeLines = [
"import ai from 'robotics'",
"boot.sequence.start()",
"raspberry.connect()",
"arduino.initialize()",
"ai.train(dataset)",
"neural_network.compile()",
"system.check()",
"robot.move()",
"sensor.scan()",
"vision.detect()",
"loop.run()",
"if(student==curious){ joinClub(); }"
]

let codeText=""

for(let i=0;i<300;i++){
codeText += codeLines[Math.floor(Math.random()*codeLines.length)]+"\n"
}

document.getElementById("codeBackground").innerText = codeText


/* 부팅 연출 */

const terminal=document.getElementById("terminal")

const bootLogs=[
"booting ai system...",
"loading robotics module...",
"connecting raspberry pi...",
"initializing sensors...",
"starting AI core...",
"ERROR: monkey_ai_not_found",
"restarting system...",
"Complete."
]

let logIndex=0

function boot(){

if(logIndex<bootLogs.length){

terminal.innerHTML+=bootLogs[logIndex]+"\n"

logIndex++

setTimeout(boot,350)

}else{

setTimeout(showMonkey,700)

}

}

boot()

function showMonkey(){

document.getElementById("monkey").style.display="block"
document.getElementById("chat").style.display="block"

typeText("안녕! 나는 인공지능탐구부의 안내 로봇 숭돌이야 🐵 궁금한 걸 눌러봐!")

}

/* 챗봇 */

const answers={

intro:"우리는 AI, 로봇, 프로그래밍, 그래픽 등..을 탐구하는 공학계열 동아리야!",

plan:"아두이노, 자율주행 자동차, 사물인터넷, 외부 프로젝트 등 다양한 활동을을 여러 교구와 함께 할 예정이야!",

target:"AI, 컴퓨터, 로봇 공학 등의 진로에 관심이 있는 1학년, 2학년 학생들을 모집하고 있어!",

apply:"신청서 제출 이후 추가적인 절차 없이 13일 면접 예정이야. 아래 지원하기 버튼을 눌러 지원서를 작성해!",

etc:"부장 20509 박진아 010-3644-0767 기타 문의사항 있으면 연락 부탁해!"
}

function typeText(text){

const bubble=document.getElementById("bubble")

bubble.innerHTML=""

let i=0

const interval=setInterval(()=>{

bubble.innerHTML+=text[i]

i++

if(i>=text.length)clearInterval(interval)

},25)

}

function ask(key){

typeText("숭돌이 생각중...")

setTimeout(()=>{

typeText(answers[key])

},800)

}

</script>

</body>
</html>
